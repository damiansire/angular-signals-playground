<div class="mol">
  <header class="mol__top">
    <a class="mol__back" routerLink="/">← Inicio</a>
    <span class="mol__title">El sistema reactivo</span>
    <a class="mol__back" routerLink="/recorrido">Otras vistas →</a>
  </header>

  <div class="track" [style.height.px]="trackHeight()">
    <div class="camera">
      <svg class="scene" viewBox="0 0 800 600" aria-hidden="true">
        <!-- Órbita punteada que crece con el cluster -->
        <circle class="orbit" cx="400" cy="300" [attr.r]="orbitR()" />

        <!-- Enlaces entre átomos -->
        @for (b of bonds; track b.at) {
          <line
            class="bond"
            [class.shown]="isShown(b.at)"
            [attr.x1]="b.x1"
            [attr.y1]="b.y1"
            [attr.x2]="b.x2"
            [attr.y2]="b.y2"
          />
        }

        <!-- Átomos (conceptos) -->
        @for (a of atoms; track a.id; let i = $index) {
          <g
            class="atom"
            [class.shown]="isShown(i)"
            [class.current]="i === revealed() - 1"
            [class.dotted]="a.dotted"
            [attr.data-accent]="a.accent"
          >
            <circle class="atom__body" [attr.cx]="a.x" [attr.cy]="a.y" r="40" />
            <text class="atom__label" [attr.x]="a.x" [attr.y]="a.y + 7">{{ a.id }}</text>
          </g>
        }
      </svg>

      <div class="caption" aria-live="polite">
        <p class="caption__scene">Escena {{ revealed() }} / {{ atoms.length }}</p>
        <h2 class="caption__name">{{ current().name }}</h2>
        <code class="caption__concept" [attr.data-accent]="current().accent">{{
          current().concept
        }}</code>
        <a class="caption__enter" [routerLink]="levelLink(current().id)">Entrar al nivel →</a>
      </div>
    </div>
  </div>

  <p class="scrollhint" aria-hidden="true">scrolleá: la molécula crece ↓</p>
</div>
