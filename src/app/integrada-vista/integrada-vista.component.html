<div class="stage" id="stage">
  <div class="track" id="track">
    <div class="holder">
      <svg class="mol" viewBox="0 0 820 600" aria-hidden="true">
        <defs>
          <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3.5" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <g id="stars"></g>
        <g id="scene">
          <g id="bonds"></g>
          <g id="atoms"></g>
          <g id="ripples"></g>
        </g>
      </svg>
      <div class="content" id="content"></div>

      <div class="topbar">
        <a class="tb-back" routerLink="/">← Inicio</a>
        <span class="tb-title">El recorrido</span>
        <span class="tb-links">
          <a routerLink="/poc">POC</a> ·
          <a routerLink="/practica/carrito">Practicá</a>
        </span>
      </div>
      <aside class="rail">
        <button class="rail-step" id="railUp" type="button" aria-label="nivel anterior">▲</button>
        <div class="rail-body" aria-hidden="true">
          <div class="rail-line"><span class="rail-dot" id="railDot"></span></div>
          <ol class="rail-ticks" id="railTicks"></ol>
        </div>
        <button class="rail-step" id="railDown" type="button" aria-label="nivel siguiente">▼</button>
      </aside>

      <!-- Título vertical del concepto (espina de identidad), pegado al riel. Solo en modo
           dissolve; el motor le pone el nombre y lo muestra al bucear. -->
      <div class="space-spine" id="spaceSpine" aria-hidden="true"></div>

      <div class="intro" id="intro" aria-hidden="true">
        <span class="intro__mouse"><span class="intro__wheel"></span></span>
        <p class="intro__label">Scrolleá para empezar</p>
      </div>
      <div class="caption"><p class="s" id="capS">Molécula · escena 1</p></div>
    </div>
  </div>
</div>
