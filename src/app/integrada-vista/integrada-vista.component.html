<div class="stage" id="stage">
  <div class="track" id="track">
    <div class="holder">
      <svg class="mol" viewBox="0 0 820 600" aria-hidden="true">
        <defs>
          <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
            <feGaussianBlur stdDeviation="3.5" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
        </defs>
        <g id="stars"></g>
        <g id="scene">
          <g id="bonds"></g>
          <g id="atoms"></g>
          <g id="ripples"></g>
        </g>
      </svg>
      <div class="content" id="content"></div>

      <div class="topbar">
        <a class="tb-back" routerLink="/">← Inicio</a>
        <span class="tb-title">El recorrido</span>
        <span class="tb-links">
          <a routerLink="/poc">POC</a> ·
          <a routerLink="/practica/carrito">Practicá</a>
        </span>
      </div>
      <aside class="rail" aria-hidden="true">
        <div class="rail-line"><span class="rail-dot" id="railDot"></span></div>
        <ol class="rail-ticks" id="railTicks"></ol>
      </aside>

      <div class="scrollcue" aria-hidden="true">
        <span class="scrollcue__mouse"><span class="scrollcue__wheel"></span></span>
        <span class="scrollcue__label">scrolleá para empezar</span>
      </div>
      <div class="caption"><p class="s" id="capS">Molécula · escena 1</p></div>
      <div class="controls">
        <button class="step" id="prev" type="button" aria-label="anterior">◀</button>
        <input class="scrubber" id="scrubber" type="range" min="0" max="60" value="0" aria-label="progreso" />
        <button class="step" id="next" type="button" aria-label="siguiente">▶</button>
      </div>
    </div>
  </div>
</div>
