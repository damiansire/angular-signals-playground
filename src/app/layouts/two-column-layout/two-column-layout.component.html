<section class="flex text-center">
  <app-title [title]="title()" class="flex-grow"></app-title>
  <ng-content select="[menuRight]" class="content-center"></ng-content>
</section>
<div class="relative flex items-start gap-8 mt-5">
  <section class="w-full">
    <ng-content select="[left]"></ng-content>
  </section>

  <section class="w-full">
    <ng-content select="[right]"></ng-content>
  </section>

  <ng-content select="[overlay]"></ng-content>
</div>
