<ul class="py-4">
  <li class="mb-4">
    <a
      routerLink="/lab"
      title="Signals Lab — el banco"
      class="flex items-center justify-center w-10 h-10 rounded-full cursor-pointer mx-auto border-2 border-amber-300 text-amber-300 hover:bg-amber-300 hover:text-gray-900 transition-colors"
    >
      <span class="font-semibold text-xs tracking-wider">LAB</span>
    </a>
  </li>
  <app-menu-separator />
  @for (menuItem of menuItems; track $index) {
    <li class="mb-4">
      <app-menu-option
        [menuItem]="menuItem"
        [levelState]="getMenuOptionStatus(menuItem.id, undefined)"
      />
      @if (menuItem.subLevels.length > 0 && showSubMenu(menuItem.id)) {
        <ul>
          @for (item of menuItem.subLevels; track $index) {
            <app-menu-separator />
            <app-menu-sub-level-option
              [item]="item"
              [levelState]="getMenuOptionStatus(menuItem.id, item.id)"
            />
          }
        </ul>
      }
    </li>
  }
</ul>
