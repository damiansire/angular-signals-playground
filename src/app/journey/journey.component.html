<div class="journey" [class.is-static]="reduceMotion">
  <!-- Chrome fijo -->
  <header class="topbar">
    <a class="topbar__back" routerLink="/">← Inicio</a>
    <span class="topbar__title">El recorrido</span>
    <span class="topbar__right">
      <a class="topbar__practice" routerLink="/integrada-vista">Vista ⇢</a>
      <a class="topbar__practice" routerLink="/poc">POC ⇢</a>
      <a class="topbar__practice" routerLink="/practica/carrito">Practicá →</a>
    </span>
  </header>

  <!-- Barra lateral del viaje (el hilo del deck) -->
  <aside class="rail" aria-hidden="true">
    <div class="rail__line">
      <span class="rail__dot" [style.top.%]="progress() * 100"></span>
    </div>
    <ol class="rail__ticks">
      @for (s of stops; track s.id; let i = $index) {
        <li class="rail__tick" [class.is-active]="isActive(i)" [attr.data-accent]="s.accent">
          {{ s.id }}
        </li>
      }
    </ol>
  </aside>

  <!-- Pista de scroll: una pantalla por concepto -->
  <div class="track" [style.height.px]="trackHeight()">
    <div class="camera">
      @for (s of stops; track s.id; let i = $index) {
        <article
          class="scene"
          [attr.data-accent]="s.accent"
          [style]="styleFor(i)"
          [attr.inert]="inertFor(i)"
        >
          <span class="scene__no">{{ s.id }} / 11</span>
          <div class="scene__orb">{{ s.id }}</div>
          <h2 class="scene__name">{{ s.name }}</h2>
          <code class="scene__concept">{{ s.concept }}</code>
          <p class="scene__blurb">{{ s.blurb }}</p>
          <a class="scene__enter" [routerLink]="levelLink(s.id)">Entrar al nivel →</a>
        </article>
      }
    </div>
  </div>

  <p class="scrollhint" aria-hidden="true">scrolleá para viajar ↓</p>
</div>
