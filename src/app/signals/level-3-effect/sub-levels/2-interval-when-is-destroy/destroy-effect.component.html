<app-concept-card
  concept="Un effect() se destruye con el componente, pero un setInterval que arrancó adentro NO se limpia solo."
  action="Activá Auto Refresh y después tocá Destroy."
  observe="El reloj desaparece, pero 'Interval Evaluation' SIGUE creciendo: el intervalo quedó vivo (leak)."
/>

<div class="flex">
  <div>
    <button (click)="destroy()">Destroy</button>
    @if (showComponent) {
      <div>
        <app-destroy-box (autoRefreshEvent)="setAutoRefresh($event)"></app-destroy-box>
      </div>
    }
    <app-event-history
      title="Interval Evaluation"
      [history]="appEventHistory()"
      stateName="Count Number:"
    ></app-event-history>
  </div>

  <div class="flex-grow">
    <app-code-legacy [lines]="lines" textSize="text-lg"></app-code-legacy>
  </div>
</div>
