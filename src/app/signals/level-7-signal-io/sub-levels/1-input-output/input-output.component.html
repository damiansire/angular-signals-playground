<app-column-and-code-layout
  title="input() y output() basados en signals"
  [codeLines]="lines()"
  concept="input() y output() reemplazan a @Input()/@Output() con signals."
  action="Tocá el contador y cambiá el paso del input."
  observe="El hijo recibe step por input y avisa al padre por output."
>
  <section class="w-80 p-5 rounded-lg shadow-md bg-white flex flex-col items-center gap-5">
    <app-counter-input label="Clicks" [step]="step()" (countChange)="onCountChange($event)" />

    <div class="text-center">
      <p class="text-sm text-gray-500">
        Paso (input): <strong class="text-amber-600">{{ step() }}</strong>
      </p>
      <p class="text-sm text-gray-500">
        Último valor emitido (output):
        <strong class="text-gray-800">
          {{ lastEmitted() === null ? '—' : lastEmitted() }}
        </strong>
      </p>
    </div>

    <button
      type="button"
      class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 px-4 rounded"
      (click)="changeStep()"
    >
      Cambiar paso del input
    </button>
  </section>
</app-column-and-code-layout>
