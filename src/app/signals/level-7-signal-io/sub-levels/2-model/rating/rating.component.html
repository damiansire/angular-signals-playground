<div class="flex gap-1" role="group" aria-label="Puntuación">
  @for (star of stars; track star) {
  <button
    type="button"
    class="text-3xl leading-none transition-transform hover:scale-110"
    [class]="star <= value() ? 'text-amber-400' : 'text-gray-300'"
    [attr.aria-label]="star + ' estrellas'"
    (click)="setValue(star)"
  >
    ★
  </button>
  }
</div>
