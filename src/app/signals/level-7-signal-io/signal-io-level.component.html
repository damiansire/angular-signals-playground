<app-title title="input() · model() · output()" />

<div class="mx-auto max-w-2xl px-6 py-4 text-gray-700">
  <p class="text-lg mb-4">
    Las APIs de componentes basadas en signals reemplazan a los decoradores
    <code class="font-mono">@Input()</code> y <code class="font-mono">@Output()</code>:
    los inputs se leen como signals y participan de la reactividad sin trucos.
  </p>
  <ul class="list-disc list-inside space-y-1 text-gray-600">
    <li><strong>Sub-nivel 1:</strong> <code class="font-mono">input()</code> (incl. <code class="font-mono">input.required()</code>) y <code class="font-mono">output()</code>.</li>
    <li><strong>Sub-nivel 2:</strong> <code class="font-mono">model()</code> para binding two-way con <code class="font-mono">[(value)]</code>.</li>
  </ul>
</div>
