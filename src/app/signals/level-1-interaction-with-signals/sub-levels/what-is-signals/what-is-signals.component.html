<app-concept-card
  concept="Un signal es un envoltorio alrededor de un valor que avisa a sus consumidores cuando ese valor cambia."
  action="Clickeá las cajitas para convertirlas en contenedores."
  observe="Cualquier tipo de valor puede ir adentro de un signal."
/>

<app-title [title]="title"></app-title>
<section class="mt-4 mb-5">
  <app-text-description
    text="Un signal es un envoltorio alrededor de un valor que notifica a sus consumidores cuando ese valor cambia."
  ></app-text-description>
</section>
<app-wrapper-animation></app-wrapper-animation>

<div>
  <section class="flex flex-wrap justify-around mt-4">
    @for (type of dataTypes; track $index) {
      @if (type.isContainer) {
        <app-container-variable-box-draw
          [variableName]="type.text"
        ></app-container-variable-box-draw>
      } @else {
        <app-variable-box-draw
          [variableName]="type.text"
          (clicked)="convertToContainer($event)"
        ></app-variable-box-draw>
      }
    }
  </section>
</div>
@if (clickCount > 0) {
  <div class="mt-4 mb-4">
    <app-text-description
      text="Un signal puede contener cualquier valor, desde primitivos hasta estructuras complejas."
    >
    </app-text-description>
  </div>
  <div class="flex justify-center">
    <div class="max-w-fit">
      <app-code [lines]="signalWrapperLines()" textSize="text-lg"></app-code>
      <p class="text-xs text-gray-400 text-center mt-2">
        SignalWrapper&lt;T&gt; es una metáfora para entender la idea; no es API real de Angular.
      </p>
    </div>
  </div>
}
