<app-column-and-code-layout
  title="Update Signal"
  [codeLines]="lines"
  concept="signal.update() calcula el nuevo valor a partir del anterior."
  action="Tocá Increase varias veces."
  observe="Cada click deriva del valor previo (value => value + 1)."
>
  <div class="counter-container">
    <div class="counter-display">Amount: {{ count() }}</div>
    <button class="counter-button" (click)="update()">Increase</button>
  </div>
</app-column-and-code-layout>
