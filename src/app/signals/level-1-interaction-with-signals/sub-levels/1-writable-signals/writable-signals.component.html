<app-column-and-code-layout
  title="Writable Signal"
  [codeLines]="lines"
  concept="signal.set() reemplaza el valor de un writable signal por uno nuevo."
  action="Escribí un número y tocá Set."
  observe="El contador toma exactamente el valor que escribiste."
>
  <section>
    <div class="counter-container">
      <div class="counter-display">Amount: {{ count() }}</div>
    </div>
    <br />
    <div class="input-group">
      <input #signalSetInput type="text" class="form-control" placeholder="Enter a value" />
      <button class="btn btn-primary" (click)="setValue()">Set</button>
    </div>
  </section>
</app-column-and-code-layout>
