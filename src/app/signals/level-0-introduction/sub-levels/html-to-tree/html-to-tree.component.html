<app-concept-card
  concept="El HTML que escribís se representa internamente como un árbol de nodos (el DOM)."
  action="Clickeá un tag del bloque de código."
  observe="Aparece o desaparece su nodo en el árbol de la izquierda."
/>
<app-two-column-layout title="Example of HTML tree construction">
  <app-tree
    [nodesToShow]="nodesToShow()"
    [htmlCode]="htmlCode"
    (viewChanged)="followTick()"
    left
  ></app-tree>
  <app-code
    textSize="text-xl"
    (codeClick)="codeClickHandler($event)"
    (htmlParsed)="onParsedCodeHandler()"
    [htmlCode]="htmlCode"
    right
  ></app-code>
  <svg
    #overlay
    overlay
    class="pointer-events-none absolute inset-0 h-full w-full"
    aria-hidden="true"
  >
    @for (line of connectors(); track line.id) {
      <path
        class="connector"
        [attr.d]="line.path"
        fill="none"
        [attr.stroke]="line.color"
        [style.color]="line.color"
        stroke-width="2.5"
        stroke-dasharray="6 8"
        stroke-linecap="round"
        opacity="0.9"
      />
    }
  </svg>
</app-two-column-layout>
