<app-column-and-code-layout
  title="Debounce a mano (effect + onCleanup)"
  [codeLines]="lines"
  concept="Sin RxJS: un effect arma un setTimeout y onCleanup cancela el anterior en cada tecla."
  action="Escribí rápido y después frená."
  observe="El valor debounced solo aparece 400ms después de la última tecla (igual que con RxJS)."
>
  <section class="w-80 p-5 rounded-lg shadow-md bg-white">
    <label for="q2" class="block text-xs font-semibold uppercase tracking-wide text-gray-400 mb-1">
      Buscar
    </label>
    <input
      id="q2"
      type="text"
      class="w-full border border-gray-300 rounded px-3 py-2 mb-5 focus:outline-none focus:ring-2 focus:ring-orange-400"
      [value]="query()"
      (input)="setQuery($any($event.target).value)"
      placeholder="Escribí algo…"
    />

    <p class="text-sm text-gray-600 mb-1">
      Inmediato: <strong class="text-gray-800">{{ query() || '—' }}</strong>
    </p>
    <p class="text-sm text-gray-600">
      Debounced (400ms): <strong class="text-orange-700">{{ debounced() || '—' }}</strong>
    </p>
  </section>
</app-column-and-code-layout>
