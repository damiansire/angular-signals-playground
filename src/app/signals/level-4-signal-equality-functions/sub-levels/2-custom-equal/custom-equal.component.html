<app-column-and-code-layout
  title="Función equal custom"
  [codeLines]="lines"
  concept="Con la opción equal definís cuándo dos valores se consideran iguales (por valor)."
  action="Tocá 'Mismo name' varias veces y comparalo con el sub-nivel 1."
  observe="Acá un objeto nuevo con el mismo name NO notifica: equal lo considera igual."
>
  <section class="w-80 p-5 rounded-lg shadow-md bg-white text-center">
    <p class="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-1">user()</p>
    <p class="text-3xl font-bold text-gray-800 mb-1">{{ user().name }}</p>
    <p class="text-sm text-gray-500 mb-5">
      Notificaciones: <strong class="text-emerald-700">{{ notifications() }}</strong>
    </p>

    <div class="flex flex-col gap-2">
      <button
        type="button"
        class="bg-gray-300 hover:bg-gray-400 text-gray-800 text-sm font-bold py-2 px-3 rounded"
        (click)="setSameName()"
      >
        Mismo name (objeto nuevo) → NO notifica
      </button>
      <button
        type="button"
        class="bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-bold py-2 px-3 rounded"
        (click)="setOtherName()"
      >
        Cambiar nombre → notifica
      </button>
    </div>
  </section>
</app-column-and-code-layout>
