<app-column-and-code-layout
  title="Igualdad por defecto (Object.is)"
  [codeLines]="lines"
  concept="Por defecto un signal usa Object.is: compara por referencia, no por contenido."
  action="Probá los tres botones y mirá el contador de notificaciones."
  observe="Un objeto NUEVO con el mismo contenido igual notifica; la misma referencia no."
>
  <section class="w-80 p-5 rounded-lg shadow-md bg-white text-center">
    <p class="text-xs font-semibold uppercase tracking-wide text-gray-400 mb-1">user()</p>
    <p class="text-3xl font-bold text-gray-800 mb-1">{{ user().name }}</p>
    <p class="text-sm text-gray-500 mb-5">
      Notificaciones: <strong class="text-indigo-700">{{ notifications() }}</strong>
    </p>

    <div class="flex flex-col gap-2">
      <button
        type="button"
        class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2 px-3 rounded"
        (click)="setSameContent()"
      >
        Mismo contenido (objeto nuevo) → notifica
      </button>
      <button
        type="button"
        class="bg-gray-300 hover:bg-gray-400 text-gray-800 text-sm font-bold py-2 px-3 rounded"
        (click)="setSameReference()"
      >
        Misma referencia → NO notifica
      </button>
      <button
        type="button"
        class="bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 px-3 rounded"
        (click)="setOtherName()"
      >
        Cambiar nombre → notifica
      </button>
    </div>
  </section>
</app-column-and-code-layout>
