<app-column-and-code-layout
  title="linkedSignal: preservar si sigue válida"
  [codeLines]="lines()"
  concept="linkedSignal con source+computation preserva el valor si sigue siendo válido."
  action="Elegí una opción y cambiá la lista."
  observe="Si tu opción sigue disponible se mantiene; si no, cae a la primera."
>
  <section class="w-80 p-5 rounded-lg shadow-md bg-white">
    <p class="text-sm text-gray-500 mb-4">
      Elegí una opción y cambiá la lista: si tu elección
      <strong>sigue disponible</strong> se mantiene; si no, cae a la primera.
    </p>

    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-2">
      Métodos disponibles
    </p>
    <div class="flex flex-wrap gap-2 mb-5">
      @for (option of shippingOptions(); track option) {
        <button
          type="button"
          class="px-3 py-1.5 rounded-full border text-sm font-medium transition-colors"
          [class]="
            option === selectedOption()
              ? 'bg-emerald-700 border-emerald-700 text-white'
              : 'bg-white border-gray-300 text-gray-700 hover:border-emerald-400'
          "
          (click)="select(option)"
        >
          {{ option }}
        </button>
      }
    </div>

    <p class="text-lg mb-5">
      Seleccionado:
      <strong class="text-emerald-700">{{ selectedOption() }}</strong>
    </p>

    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500 mb-2">
      Cambiar la fuente
    </p>
    <div class="flex gap-2">
      <button
        type="button"
        class="flex-1 bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 px-3 rounded"
        (click)="useDomestic()"
      >
        Lista nacional
      </button>
      <button
        type="button"
        class="flex-1 bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 px-3 rounded"
        (click)="useInternational()"
      >
        Lista internacional
      </button>
    </div>
  </section>
</app-column-and-code-layout>
