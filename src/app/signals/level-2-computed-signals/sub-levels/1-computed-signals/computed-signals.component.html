<app-column-and-code-layout
  title="Computed signals"
  [codeLines]="lines"
  concept="computed() deriva un valor de otros signals y se recalcula solo cuando cambian."
  action="Escribí en Name y Surname."
  observe="El saludo se actualiza solo; nunca escribís fullName a mano."
>
  <section class="profile-container">
    <div class="profile-info">
      <label for="firstName">Name:</label>
      <input type="text" (input)="setFirstName($event.target)" placeholder="Name" />
      <br />
      <label for="surname">Surname:</label>
      <input type="text" (input)="setLastName($event.target)" placeholder="Surname" />
    </div>
    <div class="profile-greeting">
      <p>Hola, {{ fullName() }}!</p>
    </div>
  </section>
</app-column-and-code-layout>
