<div class="rounded-md overflow-hidden shadow-md p-4 bg-gray-800">
  @for (item of lines(); track $index) {
    <div
      class="text-2xl font-mono whitespace-pre-wrap break-words py-2"
      [class]="lineClasses(item)"
      [class.cursor-pointer]="isInteractive(item)"
      [attr.tabindex]="isInteractive(item) ? 0 : null"
      [attr.role]="isInteractive(item) ? 'button' : null"
      (click)="isInteractive(item) && onLineClick(item)"
      (keyup.enter)="isInteractive(item) && onLineClick(item)"
    >
      {{ item.line }}
    </div>
  }
</div>
