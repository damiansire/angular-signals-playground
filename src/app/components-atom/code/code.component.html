<div class="rounded-md overflow-hidden shadow-md p-4 bg-gray-800 select-none">
  @for (item of codeLines(); track $index) {
    <div
      class="text-2xl font-mono whitespace-pre-wrap break-words py-2 cursor-pointer flex"
      [class]="lineClasses(item)"
      tabindex="0"
      role="button"
      (click)="selectBy() === 'Line' ? onLineClick(item) : null"
      (keyup.enter)="selectBy() === 'Line' ? onLineClick(item) : null"
    >
      <div [style.paddingLeft.px]="(item.indent || 0) * characterIndentSize"></div>
      @for (element of item.elements; track $index) {
        <div
          [class.bg-green-700]="element.selected"
          tabindex="0"
          role="button"
          (click)="selectBy() === 'Element' ? onElementClick(item, element) : null"
          (keyup.enter)="selectBy() === 'Element' ? onElementClick(item, element) : null"
        >
          <span [class.text-green-600]="element.reservedWord">
            {{ element.text }}
          </span>
        </div>
      }
    </div>
  }
</div>
